<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Fundo gradiente verde escuro -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1C3520"/>
      <stop offset="100%" stop-color="#0A1A0D"/>
    </radialGradient>

    <!-- Gradiente dourado para elementos principais -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0D080"/>
      <stop offset="40%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>

    <!-- Gradiente dourado claro para detalhes -->
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5E4A0"/>
      <stop offset="100%" stop-color="#D4AF60"/>
    </linearGradient>

    <!-- Brilho sutil nos pratos -->
    <linearGradient id="plateSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5E4A0" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#C9A84C" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8B6914" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Sombra suave -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Brilho dourado externo -->
    <filter id="goldGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#C9A84C" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip para bordas arredondadas do fundo -->
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- ── FUNDO ─────────────────────────────────────────────── -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Textura sutil — linhas diagonais muito tênues -->
  <g clip-path="url(#roundedClip)" opacity="0.04">
    <line x1="0" y1="100" x2="100" y2="0" stroke="#C9A84C" stroke-width="1"/>
    <line x1="0" y1="200" x2="200" y2="0" stroke="#C9A84C" stroke-width="1"/>
    <line x1="0" y1="300" x2="300" y2="0" stroke="#C9A84C" stroke-width="1"/>
    <line x1="0" y1="400" x2="400" y2="0" stroke="#C9A84C" stroke-width="1"/>
    <line x1="0" y1="512" x2="512" y2="0" stroke="#C9A84C" stroke-width="1"/>
    <line x1="100" y1="512" x2="512" y2="100" stroke="#C9A84C" stroke-width="1"/>
    <line x1="200" y1="512" x2="512" y2="200" stroke="#C9A84C" stroke-width="1"/>
    <line x1="300" y1="512" x2="512" y2="300" stroke="#C9A84C" stroke-width="1"/>
    <line x1="400" y1="512" x2="512" y2="400" stroke="#C9A84C" stroke-width="1"/>
  </g>

  <!-- Borda interna dourada sutil -->
  <rect x="10" y="10" width="492" height="492" rx="106" ry="106"
        fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.25"/>

  <!-- ── BALANÇA CENTRAL ───────────────────────────────────── -->

  <!-- BASE — pedestal -->
  <rect x="242" y="390" width="28" height="52" rx="4" fill="url(#goldGrad)"/>

  <!-- BASE — pé horizontal -->
  <rect x="188" y="428" width="136" height="18" rx="9" fill="url(#goldGrad)"/>

  <!-- COLUNA CENTRAL vertical -->
  <rect x="248" y="175" width="16" height="225" rx="6" fill="url(#goldGrad)"/>

  <!-- TOPO — capitel ornamental -->
  <ellipse cx="256" cy="172" rx="22" ry="10" fill="url(#goldLight)"/>
  <ellipse cx="256" cy="168" rx="14" ry="7" fill="url(#goldGrad)"/>

  <!-- VIGA horizontal principal -->
  <!-- Barra com curvatura sutil: linha reta com elegância -->
  <rect x="96" y="198" width="320" height="14" rx="7" fill="url(#goldGrad)" filter="url(#goldGlow)"/>

  <!-- Ponto de pivô central -->
  <circle cx="256" cy="205" r="16" fill="url(#goldGrad)" filter="url(#goldGlow)"/>
  <circle cx="256" cy="205" r="8" fill="#F5E4A0"/>
  <circle cx="256" cy="205" r="3.5" fill="#8B6914"/>

  <!-- ── PRATO ESQUERDO ────────────────────────────────────── -->
  <!-- Correntes/fios - 3 fios convergindo -->
  <line x1="118" y1="213" x2="98" y2="288" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="128" y1="213" x2="128" y2="288" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="138" y1="213" x2="158" y2="288" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Prato esquerdo - elipse com profundidade -->
  <ellipse cx="128" cy="294" rx="62" ry="14" fill="#8B6914" opacity="0.6"/>
  <ellipse cx="128" cy="288" rx="62" ry="14" fill="url(#plateSheen)"/>
  <!-- Brilho no prato -->
  <ellipse cx="120" cy="284" rx="28" ry="5" fill="#F5E4A0" opacity="0.4"/>

  <!-- ── PRATO DIREITO ─────────────────────────────────────── -->
  <!-- Fios direita -->
  <line x1="374" y1="213" x2="354" y2="288" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="384" y1="213" x2="384" y2="288" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="394" y1="213" x2="414" y2="288" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Prato direito - ligeiramente mais baixo (equilíbrio imperfeito = humano) -->
  <ellipse cx="384" cy="300" rx="62" ry="14" fill="#8B6914" opacity="0.6"/>
  <ellipse cx="384" cy="294" rx="62" ry="14" fill="url(#plateSheen)"/>
  <!-- Brilho no prato direito -->
  <ellipse cx="376" cy="290" rx="28" ry="5" fill="#F5E4A0" opacity="0.4"/>

  <!-- ── ORNAMENTO SUPERIOR — raios de luz ────────────────── -->
  <g opacity="0.18" filter="url(#softGlow)">
    <line x1="256" y1="80" x2="256" y2="145" stroke="#F5E4A0" stroke-width="2"/>
    <line x1="215" y1="92" x2="238" y2="148" stroke="#F5E4A0" stroke-width="1.5"/>
    <line x1="297" y1="92" x2="274" y2="148" stroke="#F5E4A0" stroke-width="1.5"/>
    <line x1="182" y1="120" x2="220" y2="158" stroke="#F5E4A0" stroke-width="1"/>
    <line x1="330" y1="120" x2="292" y2="158" stroke="#F5E4A0" stroke-width="1"/>
  </g>

  <!-- Ponto luminoso no topo -->
  <circle cx="256" cy="90" r="8" fill="#F5E4A0" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="256" cy="90" r="4" fill="white" opacity="0.9"/>
</svg>
